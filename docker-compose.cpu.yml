# Use with: docker compose -f docker-compose.yml -f docker-compose.cpu.yml up
services:
  acestep:
    runtime: runc
    environment:
      - CUDA_VISIBLE_DEVICES=
      - RUN_MODE=gradio
      - NVIDIA_VISIBLE_DEVICES=
      - NVIDIA_DRIVER_CAPABILITIES=
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${PORT:-7860}:${PORT:-7860}"
      - "${HOST_BIND_IP:-0.0.0.0}:${ACESTEP_API_PORT:-8000}:${ACESTEP_API_PORT:-8000}"
    volumes:
      - ./.env:/app/.env:ro
      - ./models:/root/.cache/huggingface
      - ./checkpoints:/app/checkpoints
      - ./outputs:/app/outputs
